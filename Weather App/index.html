<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="font-[Poppins] bg-gradient-to-r from-blue-100 to-blue-500 flex items-center justify-center min-h-screen">
  <div class="bg-white/90 backdrop-blur p-10 rounded-3xl shadow-2xl text-center w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-blue-500">Weather App</h1>

    <input type="text" id="cityInput" placeholder="Enter City"
      class="border p-2 rounded-xl w-full mb-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    <button id="searchBtn"
      class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-2 rounded-xl w-full mb-2">Search</button>
    <button id="locationBtn" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-xl w-full">Use My Location</button>

    <div id="result" class="mt-6 space-y-2 text-gray-700">
      <p id="icon" class="text-4xl"></p>
      <p id="temp" class="text-3xl font-bold text-blue-500"></p>
      <p id="city" class="text-lg font-semibold"></p>
      <p id="desc"></p>
      <p id="wind"></p>
      <p id="clouds"></p>
    </div>
    <script src="script.js"></script>
</body>

</html>
