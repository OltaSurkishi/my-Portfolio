<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/1950/1950715.png">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white w-full max-w-md sm:max-w-lg p-4 sm:p-6 rounded-2xl shadow-md">

    <h1 class="text-2xl sm:text-3xl font-bold text-center mb-4">To-Do App</h1>

    <div class="flex flex-col sm:flex-row gap-2 mb-4">
      <input id="taskInput" class="flex-1 border p-2 rounded focus:outline-none focus:ring" placeholder="Add a task..."/>
      <button id="addBtn" class="bg-black text-white px-4 py-2 rounded hover:scale-105 transition">Add</button>
    </div>

    <div class="flex flex-wrap gap-2 justify-center mb-3">
      <button id="allBtn" class="px-3 py-1 bg-gray-200 rounded">All</button>
      <button id="activeBtn" class="px-3 py-1 bg-gray-200 rounded">Active</button>
      <button id="doneBtn" class="px-3 py-1 bg-gray-200 rounded">Completed</button>
    </div>

    <p id="counter" class="text-center text-sm text-gray-500 mb-2"></p>

    <button id="clearDoneBtn" class="w-full sm:w-auto mb-4 bg-red-600 px-3 py-2 rounded bg-red-600 hover:bg-red-700 transition">Clear Completed</button>

    <ul id="taskList" class="space-y-2"></ul>

    <div id="modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-sm p-6 rounded-xl text-center">
        <p class="mb-4 text-lg">Are you sure you want to delete this task?</p>

        <div class="flex flex-col sm:flex-row justify-center gap-2">
          <button id="cancelBtn" class="bg-gray-300 px-4 py-2 rounded w-full sm:w-auto">
            Cancel
          </button>
          <button id="confirmBtn" class="bg-red-500 text-white px-4 py-2 rounded w-full sm:w-auto">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-sm p-6 rounded-xl text-center">
        <p class="mb-3 text-lg font-semibold">Edit your task</p>

        <input id="editInput" class="border p-2 w-full mb-4 rounded focus:outline-none focus:ring" type="text" />

        <div class="flex flex-col sm:flex-row justify-center gap-2">
          <button id="editCancelBtn" class="bg-gray-300 px-4 py-2 rounded w-full">Cancel</button>
          <button id="editSaveBtn" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Save</button>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
